{% extends "emails/base_email.html" %}
{% block subject %}{{ subject }}{% endblock %}
{% block body %}
<h2>{{ subject }}</h2>
<p>Hi {{ lead.first_name or 'there' }},</p>
<p>{{ body_text }}</p>
<div class="cta-wrap">
  <a href="{{ cta_url }}" class="cta-btn">{{ cta_label or 'Learn More' }}</a>
</div>
<p>— The {{ config.name }} Team</p>
{% endblock %}
