<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Platform Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>body{background:#0f172a;}</style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh">
  <div class="card shadow-lg p-4" style="width:380px;border-radius:14px">
    <div class="text-center mb-4">
      <div style="font-size:32px">⚡</div>
      <h5 class="fw-bold mt-2 mb-0">Platform Super Admin</h5>
      <div class="text-muted small">Principium Technology</div>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ 'danger' if cat == 'danger' else 'info' }} py-2 small">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label small fw-semibold">Email</label>
        <input type="email" name="email" class="form-control" required autofocus/>
      </div>
      <div class="mb-4">
        <label class="form-label small fw-semibold">Password</label>
        <input type="password" name="password" class="form-control" required/>
      </div>
      <button type="submit" class="btn btn-dark w-100 fw-semibold">Sign In</button>
    </form>
  </div>
</body>
</html>
