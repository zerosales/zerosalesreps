<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Dashboard Login{% if tenant %} — {{ tenant.name }}{% endif %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh">
  <div class="card shadow p-4" style="width:360px;border-radius:12px">
    <div class="text-center mb-4">
      {% if tenant and tenant.get_config('logo_url') %}
        <img src="{{ tenant.get_config('logo_url') }}" height="36" alt="{{ tenant.name }}" class="mb-2"/>
      {% else %}
        <div class="fw-bold fs-4">⚡ {{ tenant.name if tenant else 'Dashboard' }}</div>
      {% endif %}
      <div class="text-muted small mt-1">Admin Login</div>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label small fw-semibold">Email</label>
        <input type="email" name="email" class="form-control" required autofocus/>
      </div>
      <div class="mb-4">
        <label class="form-label small fw-semibold">Password</label>
        <input type="password" name="password" class="form-control" required/>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold">Sign In</button>
    </form>
  </div>
</body>
</html>
